<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>barin-mining-quest</title>

    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- 🚀 SAFE GLOBAL ERROR HANDLER (ONLY THIS IS NEEDED) -->
    <script>
      window.addEventListener("error", function (e) {
        if (
          e.message &&
          e.message.includes("ERR_UNKNOWN_URL_SCHEME")
        ) {
          console.log("Blocked Telegram URL scheme error:", e.message);
          e.preventDefault();
        }
      });

      window.addEventListener("unhandledrejection", function (e) {
        console.log("Unhandled promise:", e.reason);
      });
    </script>

  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
